<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather</title>
  <link rel="stylesheet" href="weather.css" />
</head>
<body class="weather-default">

  <div class="overlay"></div>
  <div class="bg-animation" id="bgAnimation"></div>

  <div class="page-wrap">

    <div class="container">
      <h1><span class="app-icon">☁</span> Weather App</h1>

      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name..." />
        <button onclick="getWeather()">Search</button>
      </div>

      <div class="weather-card" id="weatherCard" style="display:none;">
        <div class="weather-header">
          <div>
            <h2 id="cityName"></h2>
            <p id="weatherDesc"></p>
          </div>
          <div class="weather-icon" id="weatherIcon"></div>
        </div>

        <div class="temp-display">
          <span id="temp"></span>
          <span class="feels">Feels like <span id="feelsLike"></span></span>
        </div>

        <div class="stats">
          <div class="stat">
            <span class="stat-icon">💧</span>
            <span class="label">Humidity</span>
            <span class="value" id="humidity"></span>
          </div>
          <div class="stat">
            <span class="stat-icon">💨</span>
            <span class="label">Wind</span>
            <span class="value" id="wind"></span>
          </div>
          <div class="stat">
            <span class="stat-icon">👁</span>
            <span class="label">Visibility</span>
            <span class="value" id="visibility"></span>
          </div>
          <div class="stat">
            <span class="stat-icon">🌡</span>
            <span class="label">Pressure</span>
            <span class="value" id="pressure"></span>
          </div>
        </div>
      </div>

      <p id="errorMsg" style="display:none;">City not found. Please check the name and try again.</p>
      <p id="loadingMsg" style="display:none;">Fetching weather...</p>
    </div>

    <!-- 5-Day Forecast Section -->
    <div class="forecast-section" id="forecastSection" style="display:none;">
      <p class="forecast-title">5-Day Forecast</p>
      <div class="forecast-cards" id="forecastCards"></div>
    </div>

  </div>
  <script src="weather.js"></script>
  <script src="forecast.js"></script>
</body>
</html>
